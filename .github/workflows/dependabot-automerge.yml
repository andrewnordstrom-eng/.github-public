name: dependabot-automerge

on:
  workflow_call:

permissions:
  contents: read

jobs:
  automerge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    concurrency:
      group: dependabot-automerge-${{ github.repository }}-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: false
    steps:
      - id: gate
        name: Gate Dependabot Context
        shell: bash
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail
          if [[ "${PR_AUTHOR:-}" != "dependabot[bot]" ]]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Not a Dependabot PR; skipping automerge actions."
            exit 0
          fi
          echo "run=true" >> "$GITHUB_OUTPUT"

      - id: metadata
        if: steps.gate.outputs.run == 'true'
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve PR
        if: steps.gate.outputs.run == 'true'
        continue-on-error: true
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure major-update labels exist
        if: steps.gate.outputs.run == 'true'
        run: |
          gh label create major-update --description "Major dependency update requiring manual review" --color D93F0B --force
          gh label create needs-review --description "Requires manual review before merge" --color 5319E7 --force
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge patch and minor
        if: |
          steps.gate.outputs.run == 'true' &&
          (
            steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
            steps.metadata.outputs.update-type == 'version-update:semver-minor'
          )
        run: |
          if ! gh pr merge --auto --squash "$PR_URL"; then
            echo "::warning::Unable to enable auto-merge for $PR_URL. Leaving PR open for manual follow-up."
          fi
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Label major updates
        if: |
          steps.gate.outputs.run == 'true' &&
          steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: gh pr edit "$PR_URL" --add-label "major-update,needs-review"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip Notice
        if: steps.gate.outputs.run != 'true'
        run: echo "Dependabot automerge skipped for non-Dependabot pull request."
