name: coderabbit-queue

on:
  workflow_call:

permissions:
  contents: read

jobs:
  coderabbit-queue:
    name: coderabbit-queue
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    if: >-
      github.event.pull_request.head.repo.fork == false &&
      (github.event.pull_request.author_association == 'OWNER' ||
       github.event.pull_request.author_association == 'MEMBER' ||
       github.event.pull_request.author_association == 'COLLABORATOR')
    concurrency:
      group: coderabbit-queue-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - name: Enforce one active CodeRabbit PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;

            if (!pr) {
              core.info("No pull_request payload. Skipping queue management.");
              return;
            }

            const labels = {
              queued: "coderabbit:queued",
              active: "coderabbit:active",
              hold: "coderabbit:hold",
            };
            const ignoredAuthors = new Set(["dependabot[bot]"]);

            const ensureLabel = async (name, color, description) => {
              try {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color,
                  description,
                });
              } catch (error) {
                if (error.status !== 422) throw error;
              }
            };

            const labelNames = (item) =>
              (item.labels || []).map((l) => (typeof l === "string" ? l : l.name));

            const hasLabel = (item, name) => labelNames(item).includes(name);

            const addLabel = async (issueNumber, name) => {
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels: [name],
                });
              } catch (error) {
                if (error.status !== 422) throw error;
              }
            };

            const removeLabel = async (issueNumber, name) => {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name,
                });
              } catch (error) {
                if (error.status !== 404 && error.status !== 422) throw error;
              }
            };

            await Promise.all([
              ensureLabel(labels.queued, "A371F7", "Queued for CodeRabbit review."),
              ensureLabel(labels.active, "1D76DB", "Currently active CodeRabbit review slot."),
              ensureLabel(labels.hold, "6A737D", "Temporarily excluded from CodeRabbit queue."),
            ]);

            const currentLabels = labelNames(pr);
            const currentEligible =
              pr.state === "open" &&
              !pr.draft &&
              !ignoredAuthors.has(pr.user.login) &&
              !currentLabels.includes(labels.hold);

            if (!currentEligible) {
              await removeLabel(pr.number, labels.active);
              await removeLabel(pr.number, labels.queued);
            } else if (
              !currentLabels.includes(labels.active) &&
              !currentLabels.includes(labels.queued)
            ) {
              await addLabel(pr.number, labels.queued);
            }

            const openPrs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 100,
              sort: "created",
              direction: "asc",
            });

            const eligiblePrs = openPrs.filter(
              (p) =>
                !p.draft &&
                !ignoredAuthors.has(p.user.login) &&
                !hasLabel(p, labels.hold)
            );

            const activePrs = eligiblePrs
              .filter((p) => hasLabel(p, labels.active))
              .sort(
                (a, b) =>
                  new Date(a.created_at).getTime() - new Date(b.created_at).getTime()
              );

            let chosen = activePrs[0] || null;

            for (const extra of activePrs.slice(1)) {
              await removeLabel(extra.number, labels.active);
              await addLabel(extra.number, labels.queued);
            }

            if (!chosen) {
              const queuedPrs = eligiblePrs
                .filter((p) => hasLabel(p, labels.queued))
                .sort(
                  (a, b) =>
                    new Date(a.created_at).getTime() - new Date(b.created_at).getTime()
                );

              if (queuedPrs.length > 0) {
                chosen = queuedPrs[0];
              } else if (eligiblePrs.length > 0) {
                chosen = eligiblePrs
                  .slice()
                  .sort(
                    (a, b) =>
                      new Date(a.created_at).getTime() -
                      new Date(b.created_at).getTime()
                  )[0];
              }
            }

            if (chosen) {
              await addLabel(chosen.number, labels.active);
              await removeLabel(chosen.number, labels.queued);
            }

            for (const candidate of eligiblePrs) {
              if (chosen && candidate.number === chosen.number) continue;
              await removeLabel(candidate.number, labels.active);
              if (!hasLabel(candidate, labels.queued)) {
                await addLabel(candidate.number, labels.queued);
              }
            }

            const queuedCount = eligiblePrs.filter(
              (p) => !(chosen && p.number === chosen.number)
            ).length;

            if (chosen) {
              core.notice(
                `CodeRabbit queue active PR: #${chosen.number}; queued waiting: ${queuedCount}.`
              );
            } else {
              core.notice("No eligible PR currently queued for CodeRabbit.");
            }
