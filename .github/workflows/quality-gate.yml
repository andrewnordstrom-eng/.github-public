name: quality-gate

on:
  workflow_call:

permissions:
  contents: read

jobs:
  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js (if needed)
        if: ${{ hashFiles('**/package.json') != '' }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24'

      - name: Validate Node install (if package-lock exists)
        if: ${{ hashFiles('package-lock.json') != '' }}
        shell: bash
        run: |
          set -euo pipefail
          npm ci --ignore-scripts

      - name: Setup Python (if needed)
        if: ${{ hashFiles('**/*.py') != '' || hashFiles('**/pyproject.toml', '**/requirements*.txt') != '' }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Python syntax check (if python files exist)
        if: ${{ hashFiles('**/*.py') != '' }}
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q .
