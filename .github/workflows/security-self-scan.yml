name: security-self-scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  security-self-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Secret pattern scan
        shell: bash
        run: |
          set -euo pipefail
          fail=0
          patterns=(
            'ghp_[A-Za-z0-9]{36}'
            'github_pat_[A-Za-z0-9_]{80,}'
            'lin_api_[A-Za-z0-9]+'
            'AKIA[0-9A-Z]{16}'
            'AIza[0-9A-Za-z\-_]{35}'
            'xox[baprs]-[0-9A-Za-z\-]{10,}'
            '-----BEGIN (RSA|OPENSSH|EC|DSA) PRIVATE KEY-----'
          )

          mapfile -t files < <(git ls-files)
          scan_files=()
          for f in "${files[@]}"; do
            case "$f" in
              *.md|*.txt|LICENSE)
                continue
                ;;
              *)
                scan_files+=("$f")
                ;;
            esac
          done

          if [ "${#scan_files[@]}" -eq 0 ]; then
            echo "No files to scan."
            exit 0
          fi

          for p in "${patterns[@]}"; do
            if git grep -nI -E "$p" -- "${scan_files[@]}" >/tmp/secret_matches.txt 2>/dev/null; then
              echo "Potential secret pattern found for regex: $p"
              cat /tmp/secret_matches.txt
              fail=1
            fi
          done

          if [ "$fail" -ne 0 ]; then
            echo "Potential secrets detected."
            exit 1
          fi

          echo "No high-signal secret patterns detected."
