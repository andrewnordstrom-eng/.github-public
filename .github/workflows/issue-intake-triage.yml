name: issue-intake-triage

on:
  workflow_call:

permissions:
  contents: read

jobs:
  issue-intake-triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    concurrency:
      group: issue-intake-triage-${{ github.repository }}-${{ github.event.issue.number || github.run_id }}
      cancel-in-progress: false
    steps:
      - name: Auto-label intake priority and type
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue || issue.pull_request) {
              core.info("Not a standard issue event, skipping.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const existing = issue.labels.map((label) =>
              (typeof label === "string" ? label : label.name).toLowerCase()
            );
            const add = new Set();
            const text = `${issue.title}\n${issue.body || ""}`;

            const hasPriority = existing.some((l) => l.startsWith("priority:"));
            if (!hasPriority) {
              let priority = "priority:normal";
              if (/(critical|urgent|blocker|sev0|p0)/i.test(text)) priority = "priority:urgent";
              else if (/(high|sev1|p1)/i.test(text)) priority = "priority:high";
              else if (/(low|sev3|p3|nice to have)/i.test(text)) priority = "priority:low";
              add.add(priority);
            }

            if (!existing.includes("needs-triage")) {
              add.add("needs-triage");
            }

            const knownTypes = new Set(["bug", "enhancement", "task", "feature", "chore"]);
            const hasType = existing.some((l) => knownTypes.has(l));
            if (!hasType) {
              if (/^\s*\[bug\]/i.test(issue.title)) add.add("bug");
              else if (/^\s*\[feature\]/i.test(issue.title)) add.add("enhancement");
              else add.add("task");
            }

            if (add.size === 0) {
              core.info("Issue already has triage labels.");
              return;
            }

            const labelDefs = {
              "priority:urgent": { color: "B60205", description: "Urgent priority (P0)." },
              "priority:high": { color: "D93F0B", description: "High priority (P1)." },
              "priority:normal": { color: "FBCA04", description: "Normal priority (P2)." },
              "priority:low": { color: "0E8A16", description: "Low priority (P3)." },
              "needs-triage": { color: "5319E7", description: "Needs PM/engineering triage." },
              "task": { color: "0052CC", description: "General engineering task." }
            };

            const applied = [];
            for (const name of add) {
              const def = labelDefs[name];
              if (!def) continue;
              let skipLabel = false;
              try {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color: def.color,
                  description: def.description,
                });
              } catch (error) {
                if (error.status !== 422) throw error;
                const errs = error.response?.data?.errors || [];
                const invalidName = errs.some((e) => e.field === "name" && e.code === "invalid");
                if (invalidName) {
                  core.warning(`Skipping invalid label '${name}' in ${owner}/${repo}.`);
                  skipLabel = true;
                }
              }

              if (skipLabel) continue;

              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issue.number,
                  labels: [name],
                });
                applied.push(name);
              } catch (error) {
                if (error.status !== 422) throw error;
                core.warning(`Could not apply label '${name}' on issue #${issue.number}; continuing.`);
              }
            }

            if (applied.length === 0) {
              core.info("No labels were applied after validation constraints.");
              return;
            }

            core.info(`Added labels: ${applied.join(", ")}`);
